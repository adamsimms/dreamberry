# Dreamberry M4 hourly-path configuration (issue #14) + M5 R2 mirror.
# Wires the live weather packet through generate + gates into publish/hold/noise.
# Local scratch under data/dream/ (gitignored). With R2Store / --r2 / Modal,
# outcomes also land on art-adamsimms-xyz-dreamberry:
#   archive/<TIMESTAMP>_DREAM###.png (+ .json)  — PNG lossless
#   current/current.webp (+ .json, status.json) — WebP lossless

# How many extra generation attempts (fresh seeds) before giving up on a frame
# that the gates reject or that fails to generate. Total tries = retries + 1.
retries: 3
# Salt mixed into the hour-derived seed (blake2 of open_meteo_hour_utc).
# Same weather hour → same first-attempt seed; each new hour gets a fresh seed
# so dial-0 can twitch without raising denoise. Absolute override via
# run_hourly(seed_base=…) / scripts/dream_hourly.py --seed-base.
base_seed: 0

paths:
  # Local mirror of R2 current/ (WebP + status).
  public_dir: data/dream/public
  # Local mirror of R2 archive/ (PNG + sidecar).
  archive_dir: data/dream/archive
